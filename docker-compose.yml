services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    ports:
      # HTTP server for incoming Quest Board notify calls.
      # Set the Bot URL to http://<this-host>:8080 in Quest Board Admin → Bot Settings.
      # If Quest Board runs on the same Docker host, use its internal network address instead.
      - "8080:8080"
    volumes:
      - audio_temp:/tmp/questboard-audio
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  whisper:
    profiles: [whisper]
    image: ahmetoner/whisper-asr-webservice:latest
    # NOT exposed on public ports — internal only.
    # ASR_MODEL options: base (fastest), small, medium (most accurate)
    environment:
      - ASR_MODEL=base
    restart: unless-stopped

  # Uncomment only if Ollama is not already running on your home server.
  # ollama:
  #   profiles: [ollama]
  #   image: ollama/ollama
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

volumes:
  audio_temp:
  # ollama_data:
